services:
  # ======================================================================
  # DATABASE POSTGRESQL & PGADMIN
  # ======================================================================
  postgres:
    image: postgres:13
    container_name: postgres_db
    environment:
      - POSTGRES_USER=airflow_user
      - POSTGRES_PASSWORD=airflow_pass
      - POSTGRES_DB=emiten_db
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_gui
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@rencanakita.com
      - PGADMIN_DEFAULT_PASSWORD=adminpass
    ports:
      - "5050:80"
    volumes:
      - ./pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  # ======================================================================
  # AIRFLOW CORE
  # ======================================================================
  airflow-scheduler:
    build: .
    container_name: airflow-scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - ./db:/opt/airflow/db_shared
      - ./logs:/opt/airflow/logs
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/db_shared/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=ini_kunci_rahasia_kamu
    depends_on:
      - postgres
    command: bash -c "chmod -R 777 /opt/airflow/db_shared && airflow db init && airflow scheduler"

  airflow-webserver:
    build: .
    container_name: airflow-webserver
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./db:/opt/airflow/db_shared
      - ./logs:/opt/airflow/logs
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/db_shared/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=ini_kunci_rahasia_kamu
    depends_on:
      - airflow-scheduler
    command: bash -c "airflow webserver"